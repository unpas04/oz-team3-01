<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>덕력 감별소 — 퀴즈 진행</title>
  <link rel="stylesheet" href="common.css" />
  <style>
    body {
      background: #F8FAFC;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .quiz-container {
      width: 100%;
      max-width: 480px;
      padding: 20px;
    }

    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .question-count {
      font-weight: bold;
      color: var(--color-primary);
    }

    .quiz-card {
      background: white;
      border-radius: var(--radius-md);
      padding: 40px 24px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      margin-bottom: 30px;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #questionText {
      font-size: 1.4rem;
      line-height: 1.6;
      word-break: keep-all;
    }

    .answer-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .btn-answer {
      height: 80px;
      font-size: 1.5rem;
      font-weight: bold;
      border-radius: var(--radius-sm);
    }

    .btn-yes { background: var(--color-primary); color: white; }
    .btn-no { background: #64748B; color: white; }

    /* 타이머 스타일 */
    .timer-wrap { margin-top: 20px; }
    .timer-fill.urgent { background: #FF4D4D; }
  </style>
</head>
<body>

  <div class="quiz-container">
    <div class="quiz-header">
      <span class="question-count" id="qCount">문제 1 / 10</span>
      <span id="categoryLabel" class="gauge-grade-badge">로딩 중...</span>
    </div>

    <!-- 타이머 -->
    <div class="timer-wrap">
      <div class="timer-fill" id="timerFill" style="width: 100%"></div>
    </div>

    <div class="quiz-card">
      <h2 id="questionText">문제를 불러오는 중입니다...</h2>
    </div>

    <div class="answer-buttons">
      <button class="btn btn-answer btn-yes" onclick="handleAnswer(true)">YES</button>
      <button class="btn btn-answer btn-no" onclick="handleAnswer(false)">NO</button>
    </div>
  </div>

  <script>
    /**
     * [리텐션 루프] URL 파라미터 수신부
     * result.html(결과 페이지)에서 넘겨준 카테고리와 모드 정보를 읽어옵니다.
     * 담당자님: 이 부분은 퀴즈 초기화 시 반드시 필요합니다.
     */
    const params = new URLSearchParams(window.location.search);
    const category = params.get('category') || 'sanrio'; // 기본값 설정
    const mode = params.get('mode') || 'normal';       // 기본값 설정

    let questions = [];
    let currentIndex = 0;
    let score = 0;
    let timerValue = 30;
    let timerId = null;

    /**
     * [리텐션 루프] 데이터 동적 로드부
     * 선택된 카테고리에 맞는 JS 파일을 불러와 QUIZ_DATA를 설정합니다.
     * 담당자님: data/${category}.js 파일이 존재하는지, 변수명이 규칙을 따르는지 확인해주세요.
     */
    const script = document.createElement('script');
    script.src = `data/${category}.js`;
    script.onload = () => {
      try {
        // 데이터 파일 내 변수명 규칙: QUIZ_DATA_SANRIO, QUIZ_DATA_POKEMON 등
        const varName = `QUIZ_DATA_${category.toUpperCase()}`;
        
        // 중요: const로 선언된 전역 변수는 window[varName]으로 접근이 안 되어 eval을 사용했습니다.
        const fullData = eval(varName);
        
        if (!fullData) {
          throw new Error('데이터 구조가 올바르지 않습니다.');
        }

        // 해당 모드(normal/hard)의 문제풀에서 10개를 랜덤 추출합니다.
        const pool = fullData[mode];
        questions = pool.sort(() => Math.random() - 0.5).slice(0, 10);
        
        document.getElementById('categoryLabel').textContent = `${category.toUpperCase()} (${mode.toUpperCase()})`;
        startQuestion();
      } catch (e) {
        console.error('데이터 로드 실패:', e);
        alert('퀴즈 데이터를 불러오는데 실패했습니다. (데이터 파일의 변수명을 확인해주세요)');
      }
    };
    document.body.appendChild(script);

    function startQuestion() {
      if (currentIndex >= 10) {
        finishQuiz();
        return;
      }

      document.getElementById('qCount').textContent = `문제 ${currentIndex + 1} / 10`;
      document.getElementById('questionText').textContent = questions[currentIndex].q;
      
      // 타이머 리셋
      timerValue = 30;
      updateTimerUI();
      
      if (timerId) clearInterval(timerId);
      timerId = setInterval(() => {
        timerValue--;
        updateTimerUI();
        if (timerValue <= 0) {
          handleAnswer(null); // 시간 초과 시 오답 처리
        }
      }, 1000);
    }

    function updateTimerUI() {
      const fill = document.getElementById('timerFill');
      const pct = (timerValue / 30) * 100;
      fill.style.width = pct + '%';
      if (timerValue <= 10) fill.classList.add('urgent');
      else fill.classList.remove('urgent');
    }

    function handleAnswer(userAns) {
      clearInterval(timerId);
      const correctAnswer = questions[currentIndex].a;
      
      if (userAns === correctAnswer) {
        score += (mode === 'hard' ? 2 : 1);
      }

      currentIndex++;
      startQuestion();
    }

    /**
     * [리텐션 루프] 결과 페이지 이동부
     * 퀴즈가 끝나면 점수와 함께 결과 페이지로 사용자를 보냅니다.
     * 담당자님: 결과 처리를 위해 점수(score)를 쿼리 파라미터로 반드시 넘겨야 합니다.
     */
    function finishQuiz() {
      window.location.href = `result.html?category=${category}&mode=${mode}&score=${score}`;
    }
  </script>
</body>
</html>
